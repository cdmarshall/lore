<script>
// ─────────────────────────────────────────────────────────────────────────────
// Action Items Artifact (IndexedDB-backed)
// IndexedDB is the source of truth. All edits are instant and require no
// agent involvement. An optional auto-saved backup file (showSaveFilePicker)
// writes a markdown snapshot to disk after every change so the data is
// recoverable. Manual Export download is always available as a fallback.
// ─────────────────────────────────────────────────────────────────────────────

const TODAY = (() => { const d = new Date(); d.setHours(12,0,0,0); return d; })();
const TODAY_STR = (() => { const d = new Date(); return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); })();

// ── State ──────────────────────────────────────────────────────────────────
let activeItems = [], completedItems = [], archivedItems = [];
let items = [];
let recentlyCompleted = 0;
const agentState = {}, notesState = {};
let activeFilter = 'all', searchQuery = '';
let backupHandle = null;

// ── Storage layer ──────────────────────────────────────────────────────────
// Try IndexedDB first. If it's unavailable (Cowork's sandboxed iframe may
// block it) fall back to localStorage. If THAT's blocked, fall back to an
// in-memory store and warn the user that changes won't persist.
const STORAGE_NAMESPACE = 'lore-action-items';
let storage = null; // { kind: 'idb'|'ls'|'mem', getItem, setItem }

function memStorage() {
  const m = {};
  return {
    kind: 'mem',
    async getItem(k) { return m[k]; },
    async setItem(k, v) { m[k] = v; }
  };
}
function lsStorage() {
  return {
    kind: 'ls',
    async getItem(k) { try { const v = localStorage.getItem(STORAGE_NAMESPACE + ':' + k); return v ? JSON.parse(v) : undefined; } catch (_) { return undefined; } },
    async setItem(k, v) { localStorage.setItem(STORAGE_NAMESPACE + ':' + k, JSON.stringify(v)); }
  };
}
function idbStorage() {
  const DB = STORAGE_NAMESPACE;
  const STORE = 'data';
  function open() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(DB, 1);
      req.onupgradeneeded = () => req.result.createObjectStore(STORE);
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error || new Error('idb open failed'));
      req.onblocked = () => reject(new Error('idb open blocked'));
    });
  }
  return {
    kind: 'idb',
    async getItem(k) {
      const db = await open();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE, 'readonly');
        const r = tx.objectStore(STORE).get(k);
        r.onsuccess = () => resolve(r.result);
        r.onerror = () => reject(r.error);
      });
    },
    async setItem(k, v) {
      const db = await open();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE, 'readwrite');
        tx.objectStore(STORE).put(v, k);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    }
  };
}

async function pickStorage() {
  // Try IDB with a timeout (it can hang in some sandboxed contexts).
  if (typeof indexedDB !== 'undefined') {
    try {
      const candidate = idbStorage();
      // Smoke test: write+read a tiny key with a 2-second timeout.
      await Promise.race([
        (async () => {
          await candidate.setItem('_probe', 1);
          const v = await candidate.getItem('_probe');
          if (v !== 1) throw new Error('idb probe mismatch');
        })(),
        new Promise((_, rej) => setTimeout(() => rej(new Error('idb probe timeout')), 2000))
      ]);
      return candidate;
    } catch (_) { /* fall through to localStorage */ }
  }
  if (typeof localStorage !== 'undefined') {
    try {
      const candidate = lsStorage();
      await candidate.setItem('_probe', 1);
      if ((await candidate.getItem('_probe')) === 1) return candidate;
    } catch (_) { /* fall through */ }
  }
  return memStorage();
}

async function loadStored() {
  if (!storage) return false;
  try {
    const stored = await storage.getItem('items');
    if (!stored || !stored.activeItems) return false;
    activeItems    = stored.activeItems    || [];
    completedItems = stored.completedItems || [];
    archivedItems  = stored.archivedItems  || [];
    return true;
  } catch (_) { return false; }
}
async function saveStored() {
  if (!storage) return;
  try {
    await storage.setItem('items', { activeItems, completedItems, archivedItems, savedAt: new Date().toISOString() });
  } catch (e) {
    showToast('warn', `Local save failed (${storage.kind}): ${e.message}. Changes are in memory only — use Export to back up.`, null, null);
  }
}

// Backup-handle stash uses a small IDB if available, otherwise nothing
// (localStorage can't store FileSystemFileHandle objects).
async function stashHandle(key, handle) {
  if (storage && storage.kind === 'idb') { try { await storage.setItem(key, handle); } catch (_) {} }
}
async function loadStashedHandle(key) {
  if (storage && storage.kind === 'idb') { try { return await storage.getItem(key); } catch (_) {} }
  return undefined;
}

async function seedFromEmbedded() {
  const tag = document.getElementById('seed-data');
  const txt = tag ? tag.textContent.trim() : '';
  if (!txt || txt === '__SEED__') return false;
  const seed = JSON.parse(txt);
  activeItems    = seed.active    || [];
  completedItems = seed.completed || [];
  archivedItems  = seed.archived  || [];
  await saveStored();
  return true;
}

// ── Toast helpers ──────────────────────────────────────────────────────────
function showToast(kind, text, actionLabel, onAction, autoHideMs) {
  const t = document.getElementById('toast');
  const txt = document.getElementById('toast-text');
  const act = document.getElementById('toast-action');
  t.className = 'toast show ' + kind;
  txt.innerHTML = text;
  if (actionLabel) {
    act.textContent = actionLabel;
    act.classList.remove('hidden');
    act.onclick = onAction || null;
  } else {
    act.classList.add('hidden');
  }
  if (autoHideMs) setTimeout(hideToast, autoHideMs);
}
function hideToast() { document.getElementById('toast').classList.remove('show'); }
document.getElementById('toast-close').addEventListener('click', hideToast);

function setSync(state, label) {
  document.getElementById('sync-dot').className = 'sync-dot ' + state;
  document.getElementById('sync-label').textContent = label;
}

// ── Markdown serializer (for backup file) ──────────────────────────────────
function serializeMarkdown() {
  let out = '# Action Items\n\n> Live tracker. Source of truth is the artifact (IndexedDB). This file is an auto-saved backup written after every change.\n\n';
  out += '## Active\n\n| Date | From | Subject | Action Needed | Due | Agent | Notes |\n|------|------|---------|---------------|-----|-------|-------|\n';
  for (const it of activeItems) out += `| ${it.date || ''} | ${it.from || ''} | ${it.subject || ''} | ${it.actionNeeded || ''} | ${it.due || 'TBD'} | ${it.agent || ''} | ${it.notes || ''} |\n`;
  out += '\n## Completed\n\n| Date | From | Subject | Resolution | Completed |\n|------|------|---------|------------|-----------|\n';
  for (const it of completedItems) out += `| ${it.date || ''} | ${it.from || ''} | ${it.subject || ''} | ${it.resolution || ''} | ${it.completed || ''} |\n`;
  out += '\n## Archived\n\n| Date | From | Subject | Action Needed | Archived |\n|------|------|---------|---------------|----------|\n';
  for (const it of archivedItems) out += `| ${it.date || ''} | ${it.from || ''} | ${it.subject || ''} | ${it.actionNeeded || ''} | ${it.archived || ''} |\n`;
  out += '\n';
  return out;
}

// ── Backup file (showSaveFilePicker) ───────────────────────────────────────
async function setupBackupFile() {
  if (typeof window.showSaveFilePicker !== 'function') {
    showToast('warn', 'Backup-to-file isn\'t available in this view (showSaveFilePicker missing). The Export button still works for manual backups.', null, null);
    return;
  }
  try {
    const handle = await window.showSaveFilePicker({
      suggestedName: 'action-items.md',
      types: [{ description: 'Markdown', accept: { 'text/markdown': ['.md'] } }]
    });
    // Verify we can write — write the current state immediately as a smoke test.
    try {
      const w = await handle.createWritable();
      await w.write(serializeMarkdown());
      await w.close();
    } catch (e) {
      showToast('error', `Backup file selected, but writing failed: ${e.message}. Cowork's webview may block writes; use Export for manual backups.`, null, null);
      return;
    }
    backupHandle = handle;
    await stashHandle('backup-handle', handle);
    document.getElementById('backup-btn').textContent = 'Backup file: on';
    showToast('info', 'Backup file connected. Every change will save to it automatically.', null, null, 4000);
  } catch (e) {
    if (e.name === 'AbortError') return;
    showToast('error', `Couldn't set up backup file: ${e.message}`, null, null);
  }
}

async function tryRestoreBackupHandle() {
  try {
    const stored = await loadStashedHandle('backup-handle');
    if (!stored) return;
    // Check permission silently. If granted, use it. If not, leave the user
    // a non-blocking "reconnect backup file" hint.
    const perm = await stored.queryPermission({ mode: 'readwrite' });
    if (perm === 'granted') {
      backupHandle = stored;
      document.getElementById('backup-btn').textContent = 'Backup file: on';
    } else {
      document.getElementById('backup-btn').textContent = 'Backup file: reconnect';
    }
  } catch (_) { /* nothing stored */ }
}

async function writeBackup() {
  if (!backupHandle) return;
  try {
    // If permission was lost, this will throw.
    const w = await backupHandle.createWritable();
    await w.write(serializeMarkdown());
    await w.close();
  } catch (e) {
    // Don't block the UI; just tell the user backup failed once.
    showToast('warn', `Backup write failed: ${e.message}. Click "Backup file" to reconnect.`, 'Reconnect', setupBackupFile);
    backupHandle = null;
    document.getElementById('backup-btn').textContent = 'Backup file: off';
  }
}

document.getElementById('backup-btn').addEventListener('click', setupBackupFile);

// ── Manual export (download) ───────────────────────────────────────────────
function downloadCurrentAsMarkdown() {
  const blob = new Blob([serializeMarkdown()], { type: 'text/markdown' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `action-items-${TODAY_STR}.md`;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}
document.getElementById('export-btn').addEventListener('click', downloadCurrentAsMarkdown);

// ── Derive / render ────────────────────────────────────────────────────────
function rebuildItems() {
  for (const k in agentState) delete agentState[k];
  for (const k in notesState) delete notesState[k];
  items = activeItems.map((r, i) => {
    const p = getPriority(r.due);
    return { id: i, date: r.date, from: r.from, subject: r.subject, details: r.actionNeeded || '', due: r.due || 'TBD', agentable: r.agent === 'Y' || r.agent === 'y' || r.agent === true, notes: r.notes || '', priority: p.label, order: p.order };
  }).sort((a, b) => a.order - b.order || (a.subject||'').localeCompare(b.subject||''));
  items.forEach(it => { agentState[it.id] = it.agentable; notesState[it.id] = it.notes; });

  const thirtyDaysAgo = new Date(TODAY.getTime() - 30 * 86400000);
  recentlyCompleted = completedItems.filter(c => {
    const d = new Date((c.completed || '') + 'T12:00:00');
    return !isNaN(d) && d >= thirtyDaysAgo;
  }).length;
}

function getPriority(due) {
  if (due === 'ASAP')      return { label: 'ASAP',      order: 3 };
  if (due === 'Soon')      return { label: 'Soon',      order: 4 };
  if (due === 'This week') return { label: 'This week', order: 5 };
  if (!due || due === 'TBD') return { label: 'TBD', order: 99 };
  const d = new Date(due + 'T12:00:00'); if (isNaN(d)) return { label: 'TBD', order: 99 };
  const diff = Math.floor((d - TODAY) / 86400000);
  if (diff < 0)  return { label: 'OVERDUE',  order: 1 };
  if (diff <= 7) return { label: 'UPCOMING', order: 2 };
  return { label: 'TBD', order: 99 };
}

function relativeDue(due) {
  if (!due || ['ASAP','Soon','This week','TBD'].includes(due)) return { text: due || 'TBD', cls: '', actual: '' };
  const d = new Date(due + 'T12:00:00'); if (isNaN(d)) return { text: due, cls: '', actual: '' };
  const diff = Math.floor((d - TODAY) / 86400000);
  const actual = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  if (diff <= -2) return { text: `${Math.abs(diff)}d overdue`, cls: 'overdue', actual };
  if (diff === -1) return { text: 'yesterday', cls: 'overdue', actual };
  if (diff === 0)  return { text: 'today',     cls: 'overdue', actual };
  if (diff === 1)  return { text: 'tomorrow',  cls: 'upcoming', actual };
  if (diff <= 7)   return { text: `in ${diff} days`, cls: 'upcoming', actual };
  if (diff <= 30)  return { text: `in ${diff} days`, cls: '', actual };
  return { text: d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }), cls: '', actual };
}

function renderStats() {
  const counts = {}; items.forEach(it => { counts[it.priority] = (counts[it.priority] || 0) + 1; });
  const agentCount = Object.values(agentState).filter(Boolean).length;
  const el = document.getElementById('stats'); el.innerHTML = '';
  [
    { label: 'Total',       val: items.length,         cls: '' },
    { label: 'Overdue',     val: counts.OVERDUE  || 0, cls: 'danger' },
    { label: 'Due Soon',    val: counts.UPCOMING || 0, cls: 'warning' },
    { label: 'Agent-Ready', val: agentCount,           cls: 'agent' }
  ].forEach(s => {
    const div = document.createElement('div'); div.className = 'stat ' + s.cls;
    div.innerHTML = `<div class="stat-n">${s.val}</div><div class="stat-l">${s.label}</div>`;
    el.appendChild(div);
  });
}

const badgeCls = { OVERDUE: 'b-overdue', UPCOMING: 'b-upcoming', ASAP: 'b-asap', Soon: 'b-soon', 'This week': 'b-thisweek', TBD: 'b-tbd' };

function closeAllPopovers() { document.querySelectorAll('.due-popover.open').forEach(p => p.classList.remove('open')); }
document.addEventListener('click', e => { if (!e.target.closest('.due-cell-wrap')) closeAllPopovers(); });

function makeDuePopover(item, container) {
  const pop = document.createElement('div'); pop.className = 'due-popover';
  pop.innerHTML = `<div class="pop-label">Quick select</div><div class="pop-presets">${['ASAP','Soon','This week','TBD'].map(p => `<button class="pop-preset" data-val="${p}">${p}</button>`).join('')}</div><div class="pop-label">Pick a date</div><input type="date" class="pop-date-input"><div class="pop-label" style="margin-top:10px">Custom text</div><div class="pop-custom-row"><input class="pop-custom-input" placeholder="e.g. Ongoing"><button class="pop-set-btn">Set</button></div>`;
  function applyDue(val) {
    closeAllPopovers();
    apply({ type: 'set-due', subject: item.subject, value: val });
  }
  pop.querySelectorAll('.pop-preset').forEach(b => b.addEventListener('click', e => { e.stopPropagation(); applyDue(b.dataset.val); }));

}

function makeEditableCell(value, onCommit) {
  const wrap = document.createElement('span'); wrap.style.display = 'block';
  const display = document.createElement('span'); display.className = 'editable'; display.textContent = value;
  const input = document.createElement('input'); input.className = 'edit-input'; input.value = value;
  wrap.appendChild(display); wrap.appendChild(input);
  function startEdit() { display.classList.add('editing'); input.classList.add('visible'); input.focus(); input.select(); }
  function commit() { const nv = input.value.trim(); display.classList.remove('editing'); input.classList.remove('visible'); if (nv && nv !== value) { display.textContent = nv; onCommit(nv); value = nv; } else { input.value = value; } }
  display.addEventListener('click', startEdit);
  input.addEventListener('blur', commit);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') commit(); if (e.key === 'Escape') { input.value = value; commit(); } });
  return wrap;
}

function makeNotesArea(item) {
  const wrap = document.createElement('div'); wrap.className = 'notes-area';
  const displayRow = document.createElement('div'); displayRow.style.cssText = 'display:flex;align-items:flex-start;gap:4px;flex-wrap:wrap;';
  const display = document.createElement('span');
  const editWrap = document.createElement('div'); editWrap.className = 'notes-edit-wrap';
  const textarea = document.createElement('textarea'); textarea.className = 'notes-textarea'; textarea.rows = 2;
  const actionsDiv = document.createElement('div'); actionsDiv.className = 'notes-actions';
  const saveBtn = document.createElement('button'); saveBtn.className = 'notes-save'; saveBtn.textContent = 'Save';
  const cancelBtn = document.createElement('button'); cancelBtn.className = 'notes-cancel'; cancelBtn.textContent = 'Cancel';
  actionsDiv.appendChild(saveBtn); actionsDiv.appendChild(cancelBtn);
  editWrap.appendChild(textarea); editWrap.appendChild(actionsDiv);

  function renderDisplay() {
    const notes = notesState[item.id];
    display.className = notes ? 'notes-display' : 'notes-display empty';
    display.textContent = notes || 'Add note...';
  }
  renderDisplay();

  function openEdit() { textarea.value = notesState[item.id] || ''; editWrap.classList.add('open'); displayRow.style.display = 'none'; textarea.focus(); }
  function closeEdit() { editWrap.classList.remove('open'); displayRow.style.display = ''; }
  function saveNotes() {
    const nv = textarea.value.trim();
    if (nv !== (notesState[item.id] || '')) {
      notesState[item.id] = nv;
      renderDisplay();
      apply({ type: 'set-notes', subject: item.subject, value: nv });
    }
    closeEdit();
  }
  display.addEventListener('click', openEdit);
  saveBtn.addEventListener('click', saveNotes);
  cancelBtn.addEventListener('click', closeEdit);
  textarea.addEventListener('keydown', e => { if (e.key === 'Escape') closeEdit(); if (e.key === 'Enter' && e.metaKey) saveNotes(); });

  displayRow.appendChild(display);
  wrap.appendChild(displayRow);
  wrap.appendChild(editWrap);
  return wrap;
}

function makeAgentToggle(item) {
  const wrap = document.createElement('div'); wrap.className = 'agent-toggle';
  function render() {
    const on = agentState[item.id]; wrap.innerHTML = '';
    const chip = document.createElement('span'); chip.className = 'agent-chip ' + (on ? 'on' : 'off');
    chip.innerHTML = `<span class="dot"></span>${on ? 'Yes' : 'No'}`;
    chip.addEventListener('click', e => {
      e.stopPropagation();
      const nv = !agentState[item.id]; agentState[item.id] = nv;
      const tr = document.getElementById('row-' + item.id); if (tr) tr.classList.toggle('agent-row', nv);
      render(); renderStats();
      apply({ type: 'toggle-agent', subject: item.subject, value: nv });
    });
    wrap.appendChild(chip);
  }
  render(); return wrap;
}

function renderRows(filtered) {
  const tbody = document.getElementById('tbody'), tbl = document.getElementById('tbl'), noRes = document.getElementById('no-results');
  tbody.innerHTML = '';
  if (filtered.length === 0) { tbl.classList.add('hidden'); noRes.classList.remove('hidden'); return; }
  tbl.classList.remove('hidden'); noRes.classList.add('hidden');

  filtered.forEach(item => {
    const tr = document.createElement('tr'); tr.id = 'row-' + item.id;
    if (agentState[item.id]) tr.classList.add('agent-row');

    const tdCb = document.createElement('td'); tdCb.style.cssText = 'width:30px;vertical-align:top;padding-top:13px';
    const cb = document.createElement('input'); cb.type = 'checkbox'; cb.className = 'cb';
    tdCb.appendChild(cb);

    const tdPri = document.createElement('td'); tdPri.style.width = '88px';
    tdPri.innerHTML = `<span class="badge ${badgeCls[item.priority]}">${item.priority}</span>`;

    const tdMain = document.createElement('td');
    const subjectRow = document.createElement('div'); subjectRow.className = 'subject-row';
    const subjectEditable = makeEditableCell(item.subject, nv => {
      apply({ type: 'rename-subject', subject: item.subject, value: nv });
      item.subject = nv;
    });
    subjectEditable.querySelector('.editable').classList.add('subject-text');
    subjectRow.appendChild(subjectEditable);

    const detailsEl = document.createElement('div'); detailsEl.className = 'details-text'; detailsEl.textContent = item.details;
    detailsEl.addEventListener('click', () => detailsEl.classList.toggle('expanded'));

    const confirmStrip = document.createElement('div'); confirmStrip.className = 'confirm-strip';
    const shortName = item.subject.length > 44 ? item.subject.slice(0, 44) + '…' : item.subject;
    confirmStrip.innerHTML = `<span>Mark <strong>"${shortName}"</strong> as complete?</span><button class="btn-yes">Done</button><button class="btn-no">Cancel</button>`;
    confirmStrip.querySelector('.btn-yes').addEventListener('click', () => {
      confirmStrip.classList.remove('show');
      apply({ type: 'mark-complete', subject: item.subject });
    });
    confirmStrip.querySelector('.btn-no').addEventListener('click', () => { confirmStrip.classList.remove('show'); cb.checked = false; });

    tdMain.appendChild(subjectRow);
    tdMain.appendChild(detailsEl);
    tdMain.appendChild(makeNotesArea(item));
    tdMain.appendChild(confirmStrip);

    const tdFrom = document.createElement('td'); tdFrom.style.width = '140px';
    tdFrom.appendChild(makeEditableCell(item.from, nv => { apply({ type: 'set-from', subject: item.subject, value: nv }); }));

    const tdDue = document.createElement('td'); tdDue.style.cssText = 'width:108px;position:relative';
    const dueWrap = document.createElement('div'); dueWrap.className = 'due-cell-wrap';
    const rel = relativeDue(item.due);
    const dueDisplay = document.createElement('span'); dueDisplay.className = 'due-display ' + (rel.cls || ''); dueDisplay.textContent = rel.text;
    dueDisplay.title = rel.actual || item.due;
    const dueActual = document.createElement('div'); dueActual.className = 'due-actual'; dueActual.textContent = rel.actual;
    const pop = makeDuePopover(item, dueWrap);
    dueDisplay.addEventListener('click', e => { e.stopPropagation(); const o = pop.classList.contains('open'); closeAllPopovers(); if (!o) pop.classList.add('open'); });
    dueWrap.appendChild(dueDisplay); if (rel.actual) dueWrap.appendChild(dueActual); dueWrap.appendChild(pop); tdDue.appendChild(dueWrap);

    const tdAgent = document.createElement('td'); tdAgent.style.cssText = 'width:80px;text-align:center;vertical-align:top;padding-top:11px';
    tdAgent.appendChild(makeAgentToggle(item));

    const tdArc = document.createElement('td'); tdArc.style.cssText = 'width:68px;vertical-align:top;padding-top:11px';
    const arcBtn = document.createElement('button'); arcBtn.className = 'archive-btn'; arcBtn.textContent = 'Archive';
    arcBtn.addEventListener('click', () => { apply({ type: 'archive', subject: item.subject }); });
    tdArc.appendChild(arcBtn);

    cb.addEventListener('change', () => { cb.checked = false; confirmStrip.classList.add('show'); });
    tr.appendChild(tdCb); tr.appendChild(tdPri); tr.appendChild(tdMain); tr.appendChild(tdFrom); tr.appendChild(tdDue); tr.appendChild(tdAgent); tr.appendChild(tdArc);
    tbody.appendChild(tr);
  });

  document.getElementById('showing').textContent = `Showing ${filtered.length} of ${items.length} items  ·  ${recentlyCompleted} completed in the last 30 days`;
}

function applyFilters() {
  let f = items;
  if (activeFilter === 'agent') f = f.filter(it => agentState[it.id]);
  else if (activeFilter !== 'all') f = f.filter(it => it.priority === activeFilter);
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    f = f.filter(it => (it.subject||'').toLowerCase().includes(q) || (it.from||'').toLowerCase().includes(q) || (it.details||'').toLowerCase().includes(q) || (notesState[it.id] || '').toLowerCase().includes(q));
  }
  renderRows(f);
}
document.querySelectorAll('.pill').forEach(pill => {
  pill.addEventListener('click', () => {
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active'); activeFilter = pill.dataset.filter; applyFilters();
  });
});
document.getElementById('search').addEventListener('input', e => { searchQuery = e.target.value; applyFilters(); });

// ── Mutations: change in-memory state, persist to IDB, write backup ────────
function applyMutationToState(op) {
  const findActive = subj => activeItems.find(it => it.subject === subj);
  const findActiveIdx = subj => activeItems.findIndex(it => it.subject === subj);
  switch (op.type) {
    case 'set-due':         { const it = findActive(op.subject); if (it) it.due = op.value; break; }
    case 'set-notes':       { const it = findActive(op.subject); if (it) it.notes = op.value; break; }
    case 'toggle-agent':    { const it = findActive(op.subject); if (it) it.agent = op.value ? 'Y' : 'N'; break; }
    case 'rename-subject':  { const it = findActive(op.subject); if (it) it.subject = op.value; break; }
    case 'set-from':        { const it = findActive(op.subject); if (it) it.from = op.value; break; }
    case 'mark-complete': {
      const idx = findActiveIdx(op.subject);
      if (idx >= 0) {
        const it = activeItems.splice(idx, 1)[0];
        completedItems.unshift({ date: it.date, from: it.from, subject: it.subject, resolution: it.actionNeeded || '(complete)', completed: TODAY_STR });
      }
      break;
    }
    case 'archive': {
      const idx = findActiveIdx(op.subject);
      if (idx >= 0) {
        const it = activeItems.splice(idx, 1)[0];
        archivedItems.unshift({ date: it.date, from: it.from, subject: it.subject, actionNeeded: it.actionNeeded, archived: TODAY_STR });
      }
      break;
    }
    case 'add-item': {
      activeItems.unshift({ date: op.date || TODAY_STR, from: op.from, subject: op.subject, actionNeeded: op.actionNeeded || op.subject, due: op.due, agent: op.agent, notes: op.notes });
      break;
    }
  }
}

let saveQueue = Promise.resolve();
function apply(op) {
  setSync('stale', 'Saving...');
  applyMutationToState(op);
  rebuildItems(); renderStats(); applyFilters();
  saveQueue = saveQueue.then(async () => {
    try {
      await saveStored();
      if (backupHandle) await writeBackup();
      setSync(backupHandle ? '' : 'local', backupHandle ? 'Synced' : (storage && storage.kind !== 'mem' ? 'Saved locally' : 'In memory only'));
    } catch (err) {
      setSync('error', 'Save failed');
      showToast('error', `Save failed: ${err.message}`, null, null);
    }
  });
}

// ── Bootstrap ──────────────────────────────────────────────────────────────
async function init() {
  setSync('stale', 'Loading...');
  try {
    storage = await pickStorage();
    if (storage.kind === 'mem') {
      showToast('warn',
        'This view doesn\'t allow persistent storage (IndexedDB and localStorage both unavailable). Items will work for this session but won\'t be saved when you close the artifact. Use <strong>Export</strong> to download a backup before closing.',
        null, null);
    }

    const hasStored = await loadStored();
    if (!hasStored) {
      const seeded = await seedFromEmbedded();
      if (!seeded) {
        activeItems = []; completedItems = []; archivedItems = [];
        try { await saveStored(); } catch (_) {}
      }
    }

    rebuildItems(); renderStats(); applyFilters();
    await tryRestoreBackupHandle();

    const label = backupHandle
      ? 'Synced'
      : (storage.kind === 'mem' ? 'In memory only' : 'Saved locally');
    setSync(backupHandle ? '' : (storage.kind === 'mem' ? 'error' : 'local'), label);
  } catch (err) {
    setSync('error', 'Init failed');
    showToast('error',
      `Initialization failed: ${(err && err.message) || err}. ` +
      `Diagnostics: indexedDB=${typeof indexedDB !== 'undefined'}, localStorage=${typeof localStorage !== 'undefined'}, ` +
      `seedDataPresent=${!!document.getElementById('seed-data')}, ` +
      `seedLength=${(document.getElementById('seed-data')||{}).textContent?.length || 0}.`,
      null, null);
    // Last-resort: try to render the seed data anyway, even without storage.
    try {
      storage = memStorage();
      const seeded = await seedFromEmbedded();
      if (seeded) {
        rebuildItems(); renderStats(); applyFilters();
      }
    } catch (_) {}
  }
}

// Surface uncaught async errors so they don't disappear into nowhere.
window.addEventListener('error', e => {
  showToast('error', `Script error: ${e.message} (${e.filename}:${e.lineno})`, null, null);
});
window.addEventListener('unhandledrejection', e => {
  showToast('error', `Unhandled async error: ${(e.reason && e.reason.message) || e.reason}`, null, null);
});

init();
</script>
</body>
</html>
